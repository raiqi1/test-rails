default: &default
  adapter: mysql2
  encoding: utf8mb4
  collation: utf8mb4_unicode_ci
  pool: <%= ENV.fetch("RAILS_MAX_THREADS") { 5 } %>
  username: <%= ENV.fetch("DB_USERNAME", "root") %>
  password: <%= ENV.fetch("DB_PASSWORD", "") %>
  host: <%= ENV.fetch("DB_HOST", "127.0.0.1") %>
  port: <%= ENV.fetch("DB_PORT", 3306) %>

development:
  <<: *default
  database: restaurant_menu_development

test:
  <<: *default
  database: restaurant_menu_test

production:
  primary:
    <<: *default
    database: <%= ENV.fetch("DB_NAME", "restaurant_menu_production") %>
  cache:
    <<: *default
    database: <%= ENV.fetch("DB_NAME_CACHE", "restaurant_menu_production_cache") %>
    migrations_paths: db/cache_migrate
  queue:
    <<: *default
    database: <%= ENV.fetch("DB_NAME_QUEUE", "restaurant_menu_production_queue") %>
    migrations_paths: db/queue_migrate
  cable:
    <<: *default
    database: <%= ENV.fetch("DB_NAME_CABLE", "restaurant_menu_production_cable") %>
    migrations_paths: db/cable_migrate

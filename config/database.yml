default: &default
  adapter: postgresql
  encoding: unicode
  pool: <%= ENV.fetch("RAILS_MAX_THREADS") { 5 } %>
  username: <%= ENV.fetch("DB_USERNAME", "postgres") %>
  password: <%= ENV.fetch("DB_PASSWORD", "") %>
  host: <%= ENV.fetch("DB_HOST", "127.0.0.1") %>
  port: <%= ENV.fetch("DB_PORT", 5432) %>

development:
  <<: *default
  database: <%= ENV.fetch("DB_NAME", "restaurant_menu_development") %>

test:
  <<: *default
  database: <%= ENV.fetch("DB_NAME_TEST", "restaurant_menu_test") %>

production:
  <<: *default
  database: <%= ENV.fetch("DB_NAME", "restaurant_menu_production") %>
  url: <%= ENV["DATABASE_URL"] %>
